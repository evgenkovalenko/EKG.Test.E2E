services:

  # ── infrastructure ────────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI → http://localhost:15672  guest/guest
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── supporting services ───────────────────────────────────────────────────────

  pam:
    image: ghcr.io/evgenkovalenko/ekg.app.pam:latest
    ports:
      - "5030:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: mongodb://mongo:27017
      Redis__ConnectionString: redis:6379
      SessionManager__TtlMinutes: "120"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  wallet:
    image: ghcr.io/evgenkovalenko/ekg.app.wallet:latest
    ports:
      - "5020:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: mongodb://mongo:27017
      Redis__ConnectionString: redis:6379
      SessionManager__TtlMinutes: "120"
      Wallet__NodeId: "20"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      pam:
        condition: service_started

  jpe-admin:
    image: ghcr.io/evgenkovalenko/ekg.app.jpe.admin:latest
    ports:
      - "5010:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: mongodb://mongo:27017
      Redis__ConnectionString: redis:6379
      MessageBroker__Host: amqp://guest:guest@rabbitmq:5672/
      MessageBroker__Username: guest
      MessageBroker__Password: guest
      Jpe__NodeId: "10"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── JPE services ──────────────────────────────────────────────────────────────

  jpe-be:
    image: ghcr.io/evgenkovalenko/ekg.app.jpe.be:latest
    ports:
      - "5011:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: mongodb://mongo:27017
      Redis__ConnectionString: redis:6379
      MessageBroker__Host: amqp://guest:guest@rabbitmq:5672/
      MessageBroker__Username: guest
      MessageBroker__Password: guest
      Jpe__NodeId: "11"
      Wallet__Url: http://wallet:8080
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      wallet:
        condition: service_started

  jpe-bo:
    image: ghcr.io/evgenkovalenko/ekg.app.jpe.bo:latest
    ports:
      - "5090:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Redis__ConnectionString: redis:6379
      JpeAdmin__BaseUrl: http://jpe-admin:8080
    depends_on:
      redis:
        condition: service_healthy
      jpe-admin:
        condition: service_started

  # ── Admin service ─────────────────────────────────────────────────────────────

  admin-be:
    image: ghcr.io/evgenkovalenko/ekg.app.admin.be:latest
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: mongodb://mongo:27017
      Redis__ConnectionString: redis:6379
      Admin__SeedUsername: admin
      Admin__SeedEmail: admin@ekg.local
      Admin__SeedPassword: Admin1234!
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-ui:
    image: ghcr.io/evgenkovalenko/ekg.app.admin.ui:latest
    ports:
      - "5071:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      AdminBe__BaseUrl: http://localhost:5080
    depends_on:
      - admin-be

volumes:
  mongo-data:
