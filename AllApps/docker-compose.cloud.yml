# Runs all apps connected to remote infrastructure.
# Set variables in a .env file before starting:
#
#   MONGO_URL=mongodb+srv://user:pass@cluster.mongodb.net
#   REDIS_URL=rediss://user:pass@redis-host:6380
#   RABBITMQ_URL=amqps://user:pass@rabbit-host
#
# Usage:
#   docker compose -f docker-compose.cloud.yml up
#   tilt up -f Tiltfile.cloud

services:

  # ── PAM service ───────────────────────────────────────────────────────────────

  pam:
    image: ghcr.io/evgenkovalenko/ekg.app.pam:latest
    ports:
      - "5030:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: ${MONGO_URL}
      Redis__ConnectionString: ${REDIS_URL}
      SessionManager__TtlMinutes: "120"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/openapi/v1.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Wallet service ────────────────────────────────────────────────────────────

  wallet:
    image: ghcr.io/evgenkovalenko/ekg.app.wallet:latest
    ports:
      - "5020:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: ${MONGO_URL}
      Redis__ConnectionString: ${REDIS_URL}
      SessionManager__TtlMinutes: "120"
      Wallet__NodeId: "20"
    depends_on:
      pam:
        condition: service_healthy

  # ── GameLaunch service ────────────────────────────────────────────────────────

  gamelaunch:
    image: ghcr.io/evgenkovalenko/ekg.app.gamelaunch:latest
    ports:
      - "5040:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

  # ── JPE services ──────────────────────────────────────────────────────────────

  jpe-admin:
    image: ghcr.io/evgenkovalenko/ekg.app.jpe.admin:latest
    ports:
      - "5010:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: ${MONGO_URL}
      Redis__ConnectionString: ${REDIS_URL}
      MessageBroker__Host: ${RABBITMQ_URL}
      MessageBroker__Username: ${RABBITMQ_USER}
      MessageBroker__Password: ${RABBITMQ_PASS}
      Jpe__NodeId: "10"

  jpe-be:
    image: ghcr.io/evgenkovalenko/ekg.app.jpe.be:latest
    ports:
      - "5011:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: ${MONGO_URL}
      Redis__ConnectionString: ${REDIS_URL}
      MessageBroker__Host: ${RABBITMQ_URL}
      MessageBroker__Username: ${RABBITMQ_USER}
      MessageBroker__Password: ${RABBITMQ_PASS}
      Jpe__NodeId: "11"
      Wallet__Url: http://wallet:8080
    depends_on:
      - wallet

  jpe-broadcast:
    image: ghcr.io/evgenkovalenko/ekg.app.jpe.broadcast:latest
    ports:
      - "5012:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: ${MONGO_URL}
      Redis__ConnectionString: ${REDIS_URL}
      MessageBroker__Host: ${RABBITMQ_URL}
      MessageBroker__Username: ${RABBITMQ_USER}
      MessageBroker__Password: ${RABBITMQ_PASS}
      Jpe__NodeId: "12"

  jpe-operator-proxy:
    image: ghcr.io/evgenkovalenko/ekg.app.jpe.operatorproxy:latest
    ports:
      - "5013:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Jpe__BeUrl: http://jpe-be:8080
      Jpe__TimeoutSeconds: "5"
      Jpe__RetryCount: "3"
      Operators__Generic__PamUrl: http://pam:8080
    depends_on:
      - jpe-be
      - pam
